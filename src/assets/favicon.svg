<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background (transparent) -->
  <defs>
    <linearGradient id="fur" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#6D28D9"/>
    </linearGradient>
    <linearGradient id="face" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F5F3FF"/>
      <stop offset="1" stop-color="#EDE9FE"/>
    </linearGradient>
  </defs>

  <!-- Ears -->
  <circle cx="18" cy="16" r="10" fill="url(#fur)"/>
  <circle cx="46" cy="16" r="10" fill="url(#fur)"/>
  <circle cx="18" cy="16" r="5.5" fill="#2A1536" opacity="0.25"/>
  <circle cx="46" cy="16" r="5.5" fill="#2A1536" opacity="0.25"/>

  <!-- Head -->
  <circle cx="32" cy="34" r="22" fill="url(#fur)"/>

  <!-- Face patch -->
  <ellipse cx="32" cy="38" rx="16.5" ry="13.5" fill="url(#face)"/>

  <!-- Eye patches -->
  <ellipse cx="24" cy="33" rx="7" ry="8" fill="#2A1536" opacity="0.35"/>
  <ellipse cx="40" cy="33" rx="7" ry="8" fill="#2A1536" opacity="0.35"/>

  <!-- Eyes -->
  <circle cx="24" cy="34" r="3" fill="#111827"/>
  <circle cx="40" cy="34" r="3" fill="#111827"/>
  <circle cx="23" cy="33" r="1" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="39" cy="33" r="1" fill="#FFFFFF" opacity="0.9"/>

  <!-- Nose -->
  <path d="M32 38.5c2.3 0 4 1.4 4 3.2 0 1.9-1.9 3.8-4 3.8s-4-1.9-4-3.8c0-1.8 1.7-3.2 4-3.2z"
        fill="#111827" opacity="0.9"/>

  <!-- Mouth -->
  <path d="M28.5 45.5c1.1 1.2 2.2 1.9 3.5 1.9s2.4-.7 3.5-1.9"
        fill="none" stroke="#111827" stroke-width="2.2" stroke-linecap="round" opacity="0.75"/>

  <!-- Subtle highlight -->
  <path d="M20 28c3-7 10-11 18-11" fill="none" stroke="#FFFFFF" stroke-width="3"
        stroke-linecap="round" opacity="0.18"/>
</svg>